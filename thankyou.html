<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 60px 20px;
            background: #f7f7f7;
        }

        .thank-you-box {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h1 {
            color: #d62828;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #d62828;
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div class="thank-you-box">

        <h1>Thank You!</h1>

        <p>
            Your message has been sent successfully.
            We'll get back to you as soon as possible.
        </p>

        <a href="index.html">
            Return to Homepage
        </a>

    </div>

</body>
</html>
